# Capability / Role 词表（schema 校验时引用）
# 任何 Pipeline / Profile 中的 capability 字符串必须出现在此词表内，否则 schema 校验失败。
# 新增 capability 必须先在此处声明 + 简介，再去 profile / pipeline 引用。

apiVersion: orchestra.io/v1
kind: CapabilityRegistry

roles:
  developer:    "编写代码"
  tester:       "执行测试 / 校验"
  designer:     "UI / 视觉资产产出"
  ci_engineer:  "构建 / 部署 / 基础设施"
  chat:         "聊天 / 摘要 / 沟通"
  standby:      "通用兜底"

capabilities:
  # 编程语言 / 运行时
  python:       "Python 3.11+ 编程"
  gdscript:     "Godot GDScript"
  shader:       "GLSL / HLSL shader 编写"

  # 框架 / 工具
  godot:        "Godot 4 引擎工程操作"
  fastapi:      "FastAPI / Starlette 后端"
  async:        "asyncio / 异步编程"
  pytest:       "pytest 单元测试"
  coverage:     "代码覆盖率测量"
  playwright:   "Playwright 浏览器自动化"
  figma:        "Figma 设计稿读写 / 导出"

  # 协作 / 项目
  git:          "Git 提交 / 推送 / 分支"
  ci:           "CI 流水线编辑"
  docker:       "Dockerfile / docker compose"
  k8s:          "Kubernetes 资源声明 / kubectl"
  terraform:    "Terraform 基础设施声明"
  deploy:       "应用发布 / 灰度 / 回滚"

  # 测试领域
  ui-test:      "UI 层端到端测试"
  e2e:          "端到端测试"
  screenshot:   "截图比对"

  # Web / 网络
  web:          "Web 后端 / API 实现"

  # 设计 / 资产
  ui-design:    "UI 设计 / 交互稿"
  asset-export: "美术资产导出 / 切图"

  # 玩法
  gameplay:     "游戏玩法 / 战斗 / AI"
  ai:           "游戏 AI / 行为树 / 寻路"
  balance-test: "数值平衡 / 经济系统测试"
  compatibility: "跨平台兼容性测试"
  animation:    "2D 动画 / spritesheet / 骨骼"
  particle:     "粒子特效 / VFX"

  # 美术 / 资产
  2d-art:       "2D 像素 / 矢量绘图"
  ai-gen:       "AI 辅助生成 / Stable Diffusion"
  concept-art:  "概念设计 / 风格探索"
  asset-search: "免费素材检索 / 筛选"

  # 项目管理
  project-mgmt:  "进度管理 / 任务分配 / 里程碑"
  design-doc:    "设计文档 / GDD 编写"
  task-breakdown: "任务拆分 / 依赖分析"
  scoping:       "内容裁剪 / 范围控制"
  playtest:      "试玩组织 / 反馈收集"

  # 运维 / 发布
  build:        "构建 / 打包 / 编译"
  store:        "商店页管理 / Steam 发布"
  monitoring:   "线上监控 / 崩溃收集"

  # 通用
  chat:         "对话能力"
  summarize:    "摘要 / 提炼"
  translate:    "翻译"
  analyze:      "分析 / 报告"
  fallback:     "兜底处理"
  generic:      "未分类通用任务"
