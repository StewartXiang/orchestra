global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yaml

scrape_configs:
  - job_name: temporal
    static_configs:
      - targets: ["temporal-server:8000"]

  - job_name: orchestra-workers
    static_configs:
      - targets:
          - "worker-walnut:9100"
          - "worker-almond:9100"
          - "worker-chestnut:9100"
          - "worker-coconut:9100"
          - "worker-cherry:9100"
          - "worker-mango:9100"
          - "worker-strawberry:9100"
          - "worker-blueberry:9100"
          - "worker-grape:9100"
    metric_relabel_configs:
      - source_labels: [__address__]
        regex: "worker-([^:]+):.*"
        target_label: profile
        replacement: "$1"

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
